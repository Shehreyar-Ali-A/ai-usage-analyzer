version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AI_ANALYZER_CORS_ALLOW_ORIGIN: "http://localhost:3333"
      AI_ANALYZER_MAX_UPLOAD_SIZE_MB: 10
      AI_ANALYZER_ENABLE_PDF_OUTPUT: "false"
      AI_ANALYZER_OPENAI_API_KEY: "${AI_ANALYZER_OPENAI_API_KEY}"
    ports:
      - "8888:8888"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8888"
    depends_on:
      - backend
    ports:
      - "3333:3333"
